<html lang="en">
<head>

<title>Circuit Racer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }

}

}
#position-text {
  font-size: 20px; opacity: 0.8;
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
}

#pos-panel {

}

#message {

  opacity: 0; transition: opacity 0.3s;
}
#message.show { opacity: 1; }

#lap-times-panel {
  position: absolute; top: 130px; right: 40px;
  text-align: right;
  font-size: 14px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  line-height: 1.6;
}
#lap-times-title {
  font-size: 12px; opacity: 0.6; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 2px;
}
.lap-time-row {
  display: flex; gap: 12px; justify-content: flex-end;
}
.lap-time-row .label { opacity: 0.7; }
.lap-time-row .time { font-variant-numeric: tabular-nums; }

#controls-hint {
  position: absolute; bottom: 40px; right: 40px;

  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 13px;

  cursor: pointer;
}
#track-selector select:focus { outline: none; border-color: rgba(255,255,255,0.5); }
#track-selector select option { background: #222; }

#track-name {
  position: absolute; top: 95px; left: 40px;
  font-size: 16px; font-weight: 600;
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  opacity: 0.5;
  letter-spacing: 1px;
  text-transform: uppercase;
}

#minimap {
  position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);

  background: rgba(0,0,0,0.5);
}
#minimap canvas {
  width: 100%; height: 100%;
}

#rearview-mirror {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  width: 240px; height: 135px;
  border: 2px solid rgba(255,255,255,0.25);
  border-radius: 8px;
  background: transparent;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

#fade-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: #000;
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
  z-index: 5;
}
</style>

<div id="hud">
  <div id="pos-panel">

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }

<script>
const TRACKS = {};
</script>
<script src="tracks/circuit.js"></script>
<script src="tracks/sporting.js"></script>

<script type="module">
import * as THREE from 'three';

// ─── CONSTANTS ─────────────────────────────────────────────
const ROAD_WIDTH = 14;
const MAX_SPEED = 42;
const ACCEL = 28;
const BRAKE = 60;
const DRAG = 15;
const REVERSE_MAX_SPEED = 15;
const REVERSE_ACCEL = 28;
const TURN_SPEED = 2.2;
const TOTAL_LAPS = 3;
const NUM_CHECKPOINTS = 10;
const AI_COUNT = 0;

// ─── TRACK ─────────────────────────────────────────────────
let trackPoints = [];
let trackCurve = null;

function getTrackTangent(t) {
  return trackCurve.getTangent(t).normalize();
}

function getTrackPosition(t) {
  return trackCurve.getPoint(t);
}

let trackLength = 0;
let trackSamplePts = [];
let checkpointPositions = [];
let roadGroup = null;
let treeGroups = [];
let groundBaseHeight = -0.05;

function loadTrack(trackId) {
  const data = TRACKS[trackId];
  if (!data) return;

  // Remove old track objects
  if (roadGroup) { scene.remove(roadGroup); roadGroup = null; }
  for (const t of treeGroups) { scene.remove(t); }
  treeGroups = [];

  // Build new track
  trackPoints = data.points.map(p => new THREE.Vector3(p.x, p.y || 0, p.z));

  // Compute ground base height so terrain stays below the lowest part of the track
  let minTy = Infinity;
  for (const p of trackPoints) if (p.y < minTy) minTy = p.y;
  groundBaseHeight = Math.min(-0.05, minTy - 1);
  trackCurve = new THREE.CatmullRomCurve3(trackPoints, true, 'catmullrom', 0.5);

  const NUM_SAMPLES = 500;
  trackLength = 0;
  trackSamplePts = [];
  for (let i = 0; i <= NUM_SAMPLES; i++) {
    const t = i / NUM_SAMPLES;
    trackSamplePts.push(trackCurve.getPoint(t));
    if (i > 0) {
      trackLength += trackSamplePts[i].distanceTo(trackSamplePts[i - 1]);
    }
  }

  // Checkpoints
  checkpointPositions = [];
  for (let i = 0; i < NUM_CHECKPOINTS; i++) {
    const t = i / NUM_CHECKPOINTS;
    checkpointPositions.push(getTrackPosition(t));
  }

  // Build road
  roadGroup = buildRoad();
  scene.add(roadGroup);

  // Update terrain to match track
  updateGround();

  // Place trees
  for (let i = 0; i < 200; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 40 + Math.random() * 130;
    const x = Math.cos(angle) * dist;
    const z = Math.sin(angle) * dist;
    if (!isOnTrack(x, z)) {
      const scale = 0.6 + Math.random() * 0.8;
      const tree = createTree(x, z, scale);
      tree.position.y = getGroundHeight(x, z);
      scene.add(tree);
      treeGroups.push(tree);
    }
  }

  return data;
}

// Place trees around track (avoiding the track itself)
function isOnTrack(x, z) {
  const p = new THREE.Vector3(x, 0, z);
  for (let i = 0; i <= 100; i++) {
    const tp = getTrackPosition(i / 100);
    tp.y = 0;
    if (p.distanceTo(tp) < ROAD_WIDTH / 2 + 3) return true;
  }
  return false;
}

function getGroundHeight(x, z) {
  let bestDist = Infinity;
  let bestY = -0.05;
  for (let s = 0; s <= 200; s++) {
    const t = s / 200;
    const tp = getTrackPosition(t);
    const dx = x - tp.x;
    const dz = z - tp.z;
    const d = dx * dx + dz * dz;
    if (d < bestDist) { bestDist = d; bestY = tp.y; }
  }
  const dist = Math.sqrt(bestDist);
  const nearRadius = 12;
  const falloff = 50;
  const blend = dist < nearRadius ? 1 : Math.max(0, 1 - (dist - nearRadius) / (falloff - nearRadius));
  return (bestY - 0.05) * blend + groundBaseHeight * (1 - blend);
}

// ─── SCENE SETUP ──────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 200, 400);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 500);
const rearViewCamera = new THREE.PerspectiveCamera(75, 240 / 135, 0.1, 500);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.prepend(renderer.domElement);

const ambient = new THREE.AmbientLight(0x404060, 0.4);
scene.add(ambient);

const hemi = new THREE.HemisphereLight(0x87ceeb, 0x3a7d44, 0.6);
scene.add(hemi);

const sun = new THREE.DirectionalLight(0xffeedd, 2.5);
sun.position.set(60, 80, 40);
sun.castShadow = true;
sun.shadow.mapSize.width = 2048;
sun.shadow.mapSize.height = 2048;
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 200;
sun.shadow.camera.left = -100;
sun.shadow.camera.right = 100;
sun.shadow.camera.top = 100;
sun.shadow.camera.bottom = -100;
sun.shadow.bias = -0.001;
scene.add(sun);

// ─── GROUND ────────────────────────────────────────────────
const GROUND_SIZE = 400;
const GROUND_SEGMENTS = 100;
const groundGeo = new THREE.PlaneGeometry(GROUND_SIZE, GROUND_SIZE, GROUND_SEGMENTS, GROUND_SEGMENTS);
groundGeo.rotateX(-Math.PI / 2);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x4a9e5c,
  roughness: 0.9,
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.position.y = -0.05;
ground.receiveShadow = true;
scene.add(ground);

function updateGround() {
  const pos = groundGeo.attributes.position;
  const falloff = 50;
  const nearRadius = 12;
  for (let i = 0; i < pos.count; i++) {
    const gx = pos.getX(i);
    const gz = pos.getZ(i);
    let bestDist = Infinity;
    let bestY = -0.05;
    for (let s = 0; s <= 200; s++) {
      const t = s / 200;
      const tp = getTrackPosition(t);
      const dx = gx - tp.x;
      const dz = gz - tp.z;
      const d = dx * dx + dz * dz;
      if (d < bestDist) { bestDist = d; bestY = tp.y; }
    }
    const dist = Math.sqrt(bestDist);
    const blend = dist < nearRadius ? 1 : Math.max(0, 1 - (dist - nearRadius) / (falloff - nearRadius));
    pos.setY(i, (bestY - 0.05) * blend + groundBaseHeight * (1 - blend));
  }
  pos.needsUpdate = true;
  groundGeo.computeVertexNormals();
}

// ─── ROAD ──────────────────────────────────────────────────
function buildRoad() {
  const numSegs = 200;
  const group = new THREE.Group();
  
  const roadMat = new THREE.MeshStandardMaterial({
    color: 0x3a3a3a,
    roughness: 0.85,
    metalness: 0.1,
  });
  
  const stripeMat = new THREE.MeshStandardMaterial({
    color: 0xffffff,
    roughness: 0.5,
  });
  
  const edgeMat = new THREE.MeshStandardMaterial({
    color: 0xffffff,
    roughness: 0.5,
  });
  
  const barrierMatRed = new THREE.MeshStandardMaterial({ color: 0xcc2222, roughness: 0.6 });
  const barrierMatWhite = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.6 });
  
  const verts = [];
  const uvs = [];
  const idxs = [];
  
  for (let i = 0; i <= numSegs; i++) {
    const t = i / numSegs;
    const p = getTrackPosition(t);
    const tangent = getTrackTangent(t);
    const normal = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
    
    const left = p.clone().add(normal.clone().multiplyScalar(ROAD_WIDTH / 2));
    const right = p.clone().add(normal.clone().multiplyScalar(-ROAD_WIDTH / 2));
    
    left.y = p.y + 0.05;
    right.y = p.y + 0.05;
    
    const segT = i / numSegs;
    verts.push(left.x, left.y, left.z, right.x, right.y, right.z);
    uvs.push(0, segT, 1, segT);
    
    if (i > 0) {
      const a = (i - 1) * 2;
      const b = (i - 1) * 2 + 1;
      const c = i * 2;
      const d = i * 2 + 1;
      idxs.push(a, c, b, b, c, d);
    }
  }
  
  const roadGeo = new THREE.BufferGeometry();
  roadGeo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  roadGeo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  roadGeo.setIndex(idxs);
  roadGeo.computeVertexNormals();
  
  const road = new THREE.Mesh(roadGeo, roadMat);
  road.receiveShadow = true;
  group.add(road);
  
  // Center dashes
  const dashLen = 3;
  const dashGap = 4;
  const totalDash = dashLen + dashGap;
  const numDashes = Math.floor(numSegs * (ROAD_WIDTH / 2 / totalDash));
  
  for (let i = 0; i < numSegs; i++) {
    const t = i / numSegs;
    const segDist = t * trackLength;
    const dashPhase = segDist % totalDash;
    if (dashPhase < dashLen) {
      const p = getTrackPosition(t);
      const tangent = getTrackTangent(t);
      const normal = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
      
      const cp = p.clone().add(normal.clone().multiplyScalar(0));
      const forward = tangent.clone().multiplyScalar(1.5);
      const side = normal.clone().multiplyScalar(0.15);
      
      const shape = [
        cp.clone().add(forward).add(side),
        cp.clone().add(forward).sub(side),
        cp.clone().sub(forward).sub(side),
        cp.clone().sub(forward).add(side),
      ];
      
      const geo = new THREE.BufferGeometry();
      const sv = [];
      shape.forEach(pt => { sv.push(pt.x, pt.y + 0.06, pt.z); });
      geo.setAttribute('position', new THREE.Float32BufferAttribute(sv, 3));
      geo.setIndex([0, 1, 2, 0, 2, 3]);
      geo.computeVertexNormals();
      
      const dash = new THREE.Mesh(geo, stripeMat);
      group.add(dash);
    }
  }
  
  // Edge lines and barriers
  for (let side = -1; side <= 1; side += 2) {
    for (let i = 0; i < numSegs; i++) {
      const t = i / numSegs;
      const p = getTrackPosition(t);
      const tangent = getTrackTangent(t);
      const normal = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
      
      const edgeP = p.clone().add(normal.clone().multiplyScalar(side * (ROAD_WIDTH / 2 - 0.3)));
      const nextP = getTrackPosition((i + 1) / numSegs);
      const nextEdgeP = nextP.clone().add(
        getTrackTangent((i + 1) / numSegs)
          .clone()
          .cross(new THREE.Vector3(0, 1, 0))
          .normalize()
          .multiplyScalar(side * (ROAD_WIDTH / 2 - 0.3))
      );
      
      const dx = nextEdgeP.x - edgeP.x;
      const dz = nextEdgeP.z - edgeP.z;
      const segLen = Math.sqrt(dx * dx + dz * dz);
      
      if (segLen > 0.01) {
        const edgeGeo = new THREE.PlaneGeometry(segLen, 0.3);
        const edgeY = (edgeP.y + nextEdgeP.y) / 2;
        const edge = new THREE.Mesh(edgeGeo, edgeMat);
        edge.position.set((edgeP.x + nextEdgeP.x) / 2, edgeY + 0.08, (edgeP.z + nextEdgeP.z) / 2);
        edge.rotation.x = -Math.PI / 2;
        edge.lookAt(nextEdgeP.x, edgeY + 0.08, nextEdgeP.z);
        edge.rotateX(Math.PI / 2);
        group.add(edge);
      }
      
      // Barriers
      if (i % 2 === 0) {
        const barrierP = p.clone().add(normal.clone().multiplyScalar(side * (ROAD_WIDTH / 2 + 0.8)));
        const barrierMat = (Math.floor(i / 2) % 2 === 0) ? barrierMatRed : barrierMatWhite;
        const barrier = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.6, 0.6), barrierMat);
          barrier.position.set(barrierP.x, p.y + 0.1, barrierP.z);
          barrier.rotation.y = Math.atan2(-tangent.z, tangent.x);
          barrier.castShadow = true;
          group.add(barrier);
          
          // Reflector (small cylinder on top)
          const refMat = new THREE.MeshStandardMaterial({ color: side === 1 ? 0xff4444 : 0xffffff, emissive: side === 1 ? 0xff2222 : 0x444444, emissiveIntensity: 0.3 });
          const ref = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.1, 8), refMat);
          ref.position.set(barrierP.x, p.y + 0.45, barrierP.z);
          group.add(ref);
      }
    }
  }
  
  // Start/finish gantry
  {
    const sfP = getTrackPosition(0);
    const sfTangent = getTrackTangent(0);
    const sfNormal = new THREE.Vector3(-sfTangent.z, 0, sfTangent.x).normalize();
    
    const leftP = sfP.clone().add(sfNormal.clone().multiplyScalar(-ROAD_WIDTH / 2 - 2));
    const rightP = sfP.clone().add(sfNormal.clone().multiplyScalar(ROAD_WIDTH / 2 + 2));
    
    // Pillars
    for (const p of [leftP, rightP]) {
      const pillar = new THREE.Mesh(
        new THREE.BoxGeometry(0.4, 6, 0.4),
        new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.4, roughness: 0.3 })
      );
      pillar.position.set(p.x, sfP.y + 3, p.z);
      pillar.castShadow = true;
      group.add(pillar);
    }
    
    // Banner
    const bannerMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
    const banner = new THREE.Mesh(new THREE.PlaneGeometry(ROAD_WIDTH + 4, 1.2), bannerMat);
    const midP = sfP.clone();
    midP.y = sfP.y + 5.5;
    banner.position.copy(midP);
    banner.lookAt(midP.clone().add(sfTangent));
    banner.rotateX(Math.PI / 2);
    group.add(banner);
    
    // Checkered pattern on banner
    const checkCanvas = document.createElement('canvas');
    checkCanvas.width = 128;
    checkCanvas.height = 16;
    const ctx = checkCanvas.getContext('2d');
    const cs = 16;
    for (let x = 0; x < 128; x += cs) {
      for (let y = 0; y < 16; y += cs) {
        ctx.fillStyle = ((Math.floor(x / cs) + Math.floor(y / cs)) % 2 === 0) ? '#ffffff' : '#111111';
        ctx.fillRect(x, y, cs, cs);
      }
    }
    const checkTex = new THREE.CanvasTexture(checkCanvas);
    const checkMat = new THREE.MeshStandardMaterial({ map: checkTex });
    const checkMesh = new THREE.Mesh(new THREE.PlaneGeometry(ROAD_WIDTH + 4, 1.2), checkMat);
    checkMesh.position.copy(midP);
    checkMesh.lookAt(midP.clone().add(sfTangent));
    checkMesh.rotateX(-Math.PI / 2);
    checkMesh.position.y = sfP.y + 5.4;
    group.add(checkMesh);
    
    // Start/finish line on road
    const sfLineMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
    for (let x = -ROAD_WIDTH / 2 + 0.5; x <= ROAD_WIDTH / 2 - 0.5; x += 1.5) {
      const isWhite = Math.abs(Math.round(x / 1.5)) % 2 === 0;
      if (!isWhite) continue;
      const lP = sfP.clone().add(sfNormal.clone().multiplyScalar(x));
      const tile = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.8), sfLineMat);
      tile.position.set(lP.x, 0.07, lP.z);
      tile.rotation.x = -Math.PI / 2;
      group.add(tile);
    }
  }
  
  return group;
}

// ─── TREES ─────────────────────────────────────────────────
function createTree(x, z, scale) {
  const group = new THREE.Group();
  
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B, roughness: 0.9 });
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3 * scale, 0.5 * scale, 2 * scale, 8), trunkMat);
  trunk.position.y = 1 * scale;
  trunk.castShadow = true;
  group.add(trunk);
  
  const crownMat = new THREE.MeshStandardMaterial({ color: 0x2D7D2D, roughness: 0.8 });
  for (let i = 0; i < 3; i++) {
    const r = (1.2 - i * 0.3) * scale;
    const h = (1.8 - i * 0.3) * scale;
    const yOff = (1.8 + i * 1.0) * scale;
    const crown = new THREE.Mesh(new THREE.ConeGeometry(r, h, 8), crownMat);
    crown.position.y = yOff;
    crown.castShadow = true;
    group.add(crown);
  }
  
  group.position.set(x, 0, z);
  const rot = Math.random() * Math.PI * 2;
  group.rotation.y = rot;
  return group;
}

// ─── MOUNTAINS ────────────────────────────────────────────────
function createMountain(x, z, height, radius) {
  const group = new THREE.Group();
  const rockMat = new THREE.MeshStandardMaterial({ color: 0x6B705E, roughness: 0.85 });

  const main = new THREE.Mesh(new THREE.ConeGeometry(radius, height, 7), rockMat);
  main.position.y = height / 2;
  main.castShadow = true;
  group.add(main);

  const snowMat = new THREE.MeshStandardMaterial({ color: 0xE8E0D8, roughness: 0.6 });
  const snow = new THREE.Mesh(new THREE.ConeGeometry(radius * 0.3, height * 0.35, 7), snowMat);
  snow.position.y = height * 0.85;
  snow.castShadow = true;
  group.add(snow);

  for (let i = 0; i < 4; i++) {
    const sub = new THREE.Mesh(

function createCloud(cx, cz, scale, dark) {
  const group = new THREE.Group();
  const mat = dark ? cloudDarkMat : cloudMat;
  const parts = [
    [0, 0, 0, 1],
    [0.8, 0.15, 0.3, 0.8],
    [-0.7, 0.2, -0.2, 0.75],
    [0.4, 0.4, -0.5, 0.65],
    [-0.3, 0.35, 0.6, 0.7],
    [0.6, -0.1, -0.6, 0.6],
    [-0.6, 0.0, 0.5, 0.6],
  ];
  for (const [dx, dy, dz, s] of parts) {
    const r = s * scale;
    const geo = new THREE.SphereGeometry(r, 8, 8);
    geo.scale(1, 0.3, 1);
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(dx * scale * 0.8, dy * scale * 0.2 + scale * 0.15, dz * scale * 0.8);
    group.add(mesh);
  }
  group.position.set(cx, 30 + Math.random() * 10, cz);
  return group;
}

  isRaining = false;

  targetAmbientIntensity = 0.4;

  targetSunIntensity = 2.5;

  ambient.intensity += (targetAmbientIntensity - ambient.intensity) * dt * 2;
  hemi.intensity += (targetHemiIntensity - hemi.intensity) * dt * 2;

function createCar(color, isPlayer = false) {

  });
  const lightMat = new THREE.MeshStandardMaterial({

    emissive: 0xffdd44,
    emissiveIntensity: 0.2,
  });

    color: 0xff2200,

  });
  
  // Body
  const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.5, 4.2), bodyMat);

  cabin.castShadow = true;

  // Nose
  const nose = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.3, 0.8), bodyMat);
  nose.position.set(0, 0.18, 2.1);
  group.add(nose);
  
  // Rear
  const rear = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.35, 0.6), bodyMat);
  rear.position.set(0, 0.18, -2.1);
  group.add(rear);
  
  // Headlights
  for (const x of [-0.5, 0.5]) {
    const light = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), lightMat);
    light.position.set(x, 0.15, 2.25);

  }
  
  // Taillights
  for (const x of [-0.5, 0.5]) {

  // Wheels

    [-1.1, 0.15, -1.4],
    [1.1, 0.15, -1.4],

    if (isPlayer) {
      for (let i = 0; i < 4; i++) {
        const spoke = new THREE.Mesh(
          new THREE.BoxGeometry(0.02, 0.12, 0.02),
          rimMat
        );
        spoke.rotation.z = Math.PI / 2;
        const angle = (i / 4) * Math.PI * 2;
        spoke.position.set(0, Math.cos(angle) * 0.1, Math.sin(angle) * 0.1);

      }

const gridSpacing = 3;
const gridPositions = (() => {
  const total = AI_COUNT + 1;
  const latOffset = 2.5;
  const positions = [];
  for (let i = 0; i < total; i++) {
    const lateral = i % 2 === 0 ? -latOffset : latOffset;
    const longitudinal = -i * gridSpacing;
    const pathT = i * 0.003;
    positions.push({ t: 1.0, lateral, longitudinal, pathT });
  }
  return positions;
})();

function placeOnGrid(car, t, lateral, longitudinal) {
  const pos = getTrackPosition(t);
  const tangent = getTrackTangent(t);
  const normal = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
  const offset = normal.clone().multiplyScalar(lateral).add(tangent.clone().multiplyScalar(longitudinal));
  car.position.copy(pos.clone().add(offset));
  car.position.y = pos.y + 0.15;
  car.rotation.y = Math.atan2(tangent.x, tangent.z);
}

// ─── CHECKPOINT SYSTEM ────────────────────────────────────
function getClosestCheckpointIndex(position) {
  let minDist = Infinity;
  let minIdx = 0;
  for (let i = 0; i < NUM_CHECKPOINTS; i++) {
    const cp = checkpointPositions[i];
    const dist = position.distanceTo(cp);
    if (dist < minDist) {
      minDist = dist;
      minIdx = i;
    }
  }
  return minIdx;
}

// ─── SOUND ─────────────────────────────────────────────────
const Sound = {
  ctx: null,
  ready: false,
  osc: null,
  osc2: null,
  gain: null,
  lfo: null,
  lfoGain: null,
  brakeBuf: null,
  collisionBuf: null,
  prevBrake: false,
  prevCollision: false,
  rainGain: null,
  rainSource: null,
  rainNode: null,

  init() {
    if (this.ready) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.gain = this.ctx.createGain();
      this.gain.gain.value = 0;

      this.osc = this.ctx.createOscillator();
      this.osc.type = 'sawtooth';
      this.osc.frequency.value = 60;
      this.osc.connect(this.gain);

      this.osc2 = this.ctx.createOscillator();
      this.osc2.type = 'sawtooth';
      this.osc2.frequency.value = 63;
      this.osc2.connect(this.gain);

      this.lfo = this.ctx.createOscillator();
      this.lfo.type = 'sine';
      this.lfo.frequency.value = 0;
      this.lfoGain = this.ctx.createGain();
      this.lfoGain.gain.value = 0;
      this.lfo.connect(this.lfoGain);
      this.lfoGain.connect(this.gain.gain);

      this.osc.start();
      this.osc2.start();
      this.lfo.start();

      this.gain.connect(this.ctx.destination);

      const sr = this.ctx.sampleRate;
      let len = (sr * 0.08) | 0;
      this.brakeBuf = this.ctx.createBuffer(1, len, sr);
      let d = this.brakeBuf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);

      len = (sr * 0.15) | 0;
      this.collisionBuf = this.ctx.createBuffer(1, len, sr);
      d = this.collisionBuf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);

      len = (sr * 2) | 0;
      const rainBuf = this.ctx.createBuffer(1, len, sr);
      d = rainBuf.getChannelData(0);
      for (let i = 0; i < len; i++) {
        const t = i / sr;
        d[i] = (Math.random() * 2 - 1) * (0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * 3.7)));
      }
      this.rainGain = this.ctx.createGain();
      this.rainGain.gain.value = 0;
      this.rainGain.connect(this.ctx.destination);
      this.rainNode = { buf: rainBuf };
      this.ready = true;
    } catch (_) {}
  },

  resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); },
  suspend() { if (this.ctx && this.ctx.state === 'running') this.ctx.suspend(); },

  upEngine(spd) {
    if (!this.ctx) return;
    const f = 60 + Math.min(spd, 50) * 1.8;
    const v = Math.min(spd / 70, 0.05);
    this.osc.frequency.setTargetAtTime(f, this.ctx.currentTime, 0.06);
    this.osc2.frequency.setTargetAtTime(f + 4, this.ctx.currentTime, 0.06);
    this.gain.gain.setTargetAtTime(v, this.ctx.currentTime, 0.06);
    const lfoRate = 20 + Math.min(spd, 50) * 0.8;
    this.lfo.frequency.setTargetAtTime(lfoRate, this.ctx.currentTime, 0.06);
    this.lfoGain.gain.setTargetAtTime(v * 0.4, this.ctx.currentTime, 0.06);
  },

  offEngine() { if (this.ctx) { this.gain.gain.setTargetAtTime(0, this.ctx.currentTime, 0.03); this.lfoGain.gain.setTargetAtTime(0, this.ctx.currentTime, 0.03); } },

  startRain() {
    if (!this.ctx || this.rainSource) return;
    this.rainSource = this.ctx.createBufferSource();
    this.rainSource.buffer = this.rainNode.buf;
    this.rainSource.loop = true;
    this.rainSource.connect(this.rainGain);
    this.rainSource.start();
    this.rainGain.gain.setTargetAtTime(0.08, this.ctx.currentTime, 0.5);
  },

  stopRain() {
    if (!this.ctx || !this.rainSource) return;
    this.rainGain.gain.setTargetAtTime(0, this.ctx.currentTime, 0.5);
    const src = this.rainSource;
    setTimeout(() => { try { src.stop(); src.disconnect(); } catch(_) {} }, 1000);
    this.rainSource = null;
  },

  _note(f, t, d, v = 0.25) {
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = 'sine'; o.frequency.value = f;
    g.gain.setValueAtTime(v, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + d);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(t); o.stop(t + d);
  },

  beep(f, d, v) { this._note(f, this.ctx.currentTime, d, v); },

  lap() {
    const t = this.ctx.currentTime;
    this._note(523, t, 0.08);
    this._note(659, t + 0.08, 0.08);
    this._note(784, t + 0.16, 0.15);
  },

  finalLap() {
    const t = this.ctx.currentTime;
    this._note(392, t, 0.1, 0.3);
    this._note(523, t + 0.1, 0.1, 0.3);
    this._note(659, t + 0.2, 0.12, 0.3);
    this._note(784, t + 0.32, 0.25, 0.35);
  },

  finish() {
    const t = this.ctx.currentTime;
    this._note(523, t, 0.12, 0.3);
    this._note(659, t + 0.12, 0.12, 0.3);
    this._note(784, t + 0.24, 0.12, 0.3);
    this._note(1047, t + 0.36, 0.3, 0.35);
    this._note(784, t + 0.66, 0.15, 0.25);
    this._note(1047, t + 0.82, 0.4, 0.35);
  },

  brake() {
    if (!this.ctx) return;
    const src = this.ctx.createBufferSource();
    src.buffer = this.brakeBuf;
    const f = this.ctx.createBiquadFilter();
    f.type = 'lowpass';
    f.frequency.value = 300;
    const g = this.ctx.createGain();
    g.gain.value = 0.10;
    src.connect(f); f.connect(g); g.connect(this.ctx.destination);
    src.start();
  },

  collision() {
    if (!this.ctx) return;
    const src = this.ctx.createBufferSource();
    src.buffer = this.collisionBuf;
    const g = this.ctx.createGain();
    g.gain.value = 0.2;
    const f = this.ctx.createBiquadFilter();
    f.type = 'lowpass';
    f.frequency.setValueAtTime(800, this.ctx.currentTime);
    f.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.12);
    src.connect(f); f.connect(g); g.connect(this.ctx.destination);
    src.start();
  },

  offTrack() {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    this._note(350, t, 0.12, 0.3);
    this._note(250, t + 0.12, 0.18, 0.3);
  },
};

// ─── HUD ───────────────────────────────────────────────────
const speedValEl = document.getElementById('speed-value');
const lapTextEl = document.getElementById('lap-text');
const timerTextEl = document.getElementById('timer-text');
const positionTextEl = document.getElementById('position-text');
const posLabelEl = document.getElementById('pos-label');
const lapTimesListEl = document.getElementById('lap-times-list');

function updateHUD() {
  const displaySpeed = Math.round(Math.abs(playerSpeed) * 2.5);
  speedValEl.textContent = (playerSpeed < -0.5 ? 'R ' : '') + Math.min(displaySpeed, 999);
  
  if (!gameOver) {
    lapTextEl.textContent = `LAP ${Math.min(playerLap + 1, TOTAL_LAPS)} / ${TOTAL_LAPS}`;
  }
  
  const mins = Math.floor(gameTime / 60);
  const secs = Math.floor(gameTime % 60);
  const hundredths = Math.floor((gameTime % 1) * 100);
  timerTextEl.textContent = `${mins}:${secs.toString().padStart(2, '0')}.${hundredths.toString().padStart(2, '0')}`;
  
  // Position
  updatePositions();
  const playerPos = racePositions.findIndex(p => p.isPlayer);
  const posText = playerPos >= 0 ? `${playerPos + 1}${getOrdinalSuffix(playerPos + 1)}` : '—';
  positionTextEl.textContent = posText;
  positionTextEl.style.color = playerPos === 0 ? '#ffd700' : '#ffffff';
  
  // Lap times
  let html = '';
  let best = Math.min(...playerLapTimes);
  for (let i = 0; i < playerLapTimes.length; i++) {
    const cls = playerLapTimes[i] === best && playerLapTimes.length > 1 ? 'lap-time-row best' : 'lap-time-row';
    html += `<div class="${cls}"><span class="label">Lap ${i + 1}</span><span class="time">${formatTime(playerLapTimes[i])}</span></div>`;
  }
  lapTimesListEl.innerHTML = html;
}

function formatTime(t) {
  const mins = Math.floor(t / 60);
  const secs = Math.floor(t % 60);
  const hundredths = Math.floor((t % 1) * 100);
  return `${mins}:${secs.toString().padStart(2, '0')}.${hundredths.toString().padStart(2, '0')}`;
}

function getOrdinalSuffix(n) {
  if (n === 1) return 'st';
  if (n === 2) return 'nd';
  if (n === 3) return 'rd';
  return 'th';
}

function updatePositions() {
  if (gameOver && racePositions.length) return;
  racePositions = [];
  
  // Player progress — use closest checkpoint index, same sector system as AI
  let playerCIdx = getClosestCheckpointIndex(playerCar.position);
  if (playerCIdx === 0 && playerLastCheckpoint > NUM_CHECKPOINTS / 2) {
    playerCIdx = NUM_CHECKPOINTS - 1;
  }
  const playerProgress = playerLap * NUM_CHECKPOINTS + playerCIdx;
  racePositions.push({ progress: playerProgress, isPlayer: true, finished: playerFinished, gridOrder: AI_COUNT });
  
  // AI progress
  for (let i = 0; i < AI_COUNT; i++) {
    const ai = aiData[i];
    const aiProgress = ai.lap * NUM_CHECKPOINTS + Math.floor(ai.t * NUM_CHECKPOINTS);
    racePositions.push({ progress: aiProgress, isPlayer: false, finished: ai.finished, gridOrder: i });
  }
  
  racePositions.sort((a, b) => {
    if (a.finished !== b.finished) return a.finished ? -1 : 1;
    if (b.progress !== a.progress) return b.progress - a.progress;
    return a.gridOrder - b.gridOrder;
  });
}

// ─── MINIMAP ──────────────────────────────────────────────
const minimapCanvas = document.getElementById('minimap-canvas');
const minimapCtx = minimapCanvas.getContext('2d');

function updateMinimap() {
  const w = 140, h = 140;
  minimapCtx.clearRect(0, 0, w, h);
  
  // Background
  minimapCtx.fillStyle = 'rgba(30,60,30,0.8)';
  minimapCtx.fillRect(0, 0, w, h);
  
  // Find bounding box of track
  let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
  for (const pt of trackPoints) {
    if (pt.x < minX) minX = pt.x;
    if (pt.x > maxX) maxX = pt.x;
    if (pt.z < minZ) minZ = pt.z;
    if (pt.z > maxZ) maxZ = pt.z;
  }
  const range = Math.max(maxX - minX, maxZ - minZ) * 1.3;
  const cx = (minX + maxX) / 2;
  const cz = (minZ + maxZ) / 2;
  const scale = w / range;
  
  function worldToMap(wx, wz) {
    const mx = (wx - cx) * scale + w / 2;
    const my = (wz - cz) * scale + h / 2;
    return [mx, my];
  }
  
  // Draw track
  minimapCtx.strokeStyle = '#555';
  minimapCtx.lineWidth = 12;
  minimapCtx.beginPath();
  for (let i = 0; i <= 100; i++) {
    const p = getTrackPosition(i / 100);
    const [mx, my] = worldToMap(p.x, p.z);
    if (i === 0) minimapCtx.moveTo(mx, my);
    else minimapCtx.lineTo(mx, my);
  }
  minimapCtx.closePath();
  minimapCtx.stroke();
  
  // Draw track center
  minimapCtx.strokeStyle = '#888';
  minimapCtx.lineWidth = 1;
  minimapCtx.setLineDash([2, 3]);
  minimapCtx.beginPath();
  for (let i = 0; i <= 100; i++) {
    const p = getTrackPosition(i / 100);
    const [mx, my] = worldToMap(p.x, p.z);
    if (i === 0) minimapCtx.moveTo(mx, my);
    else minimapCtx.lineTo(mx, my);
  }
  minimapCtx.closePath();
  minimapCtx.stroke();
  minimapCtx.setLineDash([]);
  
  // AI cars
  for (let i = 0; i < AI_COUNT; i++) {
    const ai = aiData[i];
    const p = getTrackPosition(ai.t);
    const [mx, my] = worldToMap(p.x, p.z);
    minimapCtx.beginPath();
    minimapCtx.arc(mx, my, 3, 0, Math.PI * 2);
    minimapCtx.fillStyle = '#ffdd44';
    minimapCtx.fill();
  }
  
  // Player car
  {
    const [mx, my] = worldToMap(playerCar.position.x, playerCar.position.z);
    minimapCtx.beginPath();
    minimapCtx.arc(mx, my, 4, 0, Math.PI * 2);
    minimapCtx.fillStyle = '#ff2222';
    minimapCtx.fill();
    minimapCtx.strokeStyle = '#ffffff';
    minimapCtx.lineWidth = 1;
    minimapCtx.stroke();
  }
}

// ─── PHYSICS UPDATE ───────────────────────────────────────
function updatePlayer(dt) {
  if (countdown > 0) return;
  
  if (gameOver) {
    if (playerSpeed > 0) {
      playerSpeed = Math.max(playerSpeed - DRAG * dt, 0);
    } else if (playerSpeed < 0) {
      playerSpeed = Math.min(playerSpeed + DRAG * dt, 0);
    }
  } else {
    const accel = keys.w || keys.up;
    const brake = keys.s || keys.down;
    const left = keys.a || keys.left;
    const right = keys.d || keys.right;
    
    if (accel) {
      if (playerSpeed < 0) {
        playerSpeed = Math.min(playerSpeed + ACCEL * dt, 0);
      } else {
        playerSpeed = Math.min(playerSpeed + ACCEL * dt, MAX_SPEED);
      }
    } else if (brake) {
      if (playerSpeed > 0) {
        playerSpeed = Math.max(playerSpeed - BRAKE * dt, 0);
        if (playerSpeed > 3) Sound.brake();
      } else {
        playerSpeed = Math.max(playerSpeed - REVERSE_ACCEL * dt, -REVERSE_MAX_SPEED);
      }
    } else {
      if (playerSpeed > 0) {
        playerSpeed = Math.max(playerSpeed - DRAG * dt, 0);
      } else if (playerSpeed < 0) {
        playerSpeed = Math.min(playerSpeed + DRAG * dt, 0);
      }
    }
    
    const absSpd = Math.abs(playerSpeed);
    if (absSpd > 0.1) {
      let turnFactor = TURN_SPEED * (absSpd / MAX_SPEED + 0.15) * dt;
      const dir = playerSpeed < 0 ? -1 : 1;
      if (left) playerCar.rotation.y += turnFactor * dir;
      if (right) playerCar.rotation.y -= turnFactor * dir;
      // Speed loss from turning at speed
      if (absSpd > 15 && (left || right)) {
        playerSpeed *= 1 - 0.07 * (absSpd / MAX_SPEED) * dt;
      }
    }
  }
  
  const absSpd = Math.abs(playerSpeed);
  
  const forward = new THREE.Vector3(
    Math.sin(playerCar.rotation.y),
    0,
    Math.cos(playerCar.rotation.y)
  );
  
  playerCar.position.x += forward.x * playerSpeed * dt;
  playerCar.position.z += forward.z * playerSpeed * dt;
  
  // Keep on ground
  const trackT = _getTrackT(playerCar.position);
  const targetY = getTrackPosition(trackT).y + 0.15;
  playerCar.position.y += (targetY - playerCar.position.y) * Math.min(1, dt * 25);

  // Body roll away from turn at higher speeds
  if (!gameOver) {
    let targetRoll = 0;
    const speedRatio = absSpd / MAX_SPEED;
    if (speedRatio > 0.3) {
      const rollAmount = (speedRatio - 0.3) / 0.7 * 0.08;
      const left = keys.a || keys.left;
      const right = keys.d || keys.right;
      if (left) targetRoll = rollAmount;
      if (right) targetRoll = -rollAmount;
    }
    const roll = playerCar.rotation.z || 0;
    playerCar.rotation.z = roll + (targetRoll - roll) * Math.min(1, dt * 8);
  }

  // Pitch to match road slope
  const tangent = getTrackTangent(trackT);
  const pitch = -Math.atan2(tangent.y, Math.sqrt(tangent.x * tangent.x + tangent.z * tangent.z));
  playerCar.rotation.x += (pitch - playerCar.rotation.x) * Math.min(1, dt * 15);
  
  // Start/finish line crossing detection (along-track direction)
  const sfPos = checkpointPositions[0];
  const sfTan = trackCurve.getTangent(0);
  const toCar = playerCar.position.clone().sub(sfPos);
  const along = toCar.dot(sfTan);

  if (playerPrevAlong < 0 && along >= 0 && playerSpeed > 0 && (playerFinishCrossings === 0 || playerCheckpointsPassed >= NUM_CHECKPOINTS / 2)) {
    playerFinishCrossings++;
    if (playerFinishCrossings > 1) {
      playerLapTimes.push(gameTime - playerLastLapTime);
      playerLastLapTime = gameTime;
      playerCheckpointsPassed = 0;
      playerLastCheckpoint = 0;
      playerLap++;
      if (playerLap >= TOTAL_LAPS) {
        playerFinished = true;
        gameOver = true;
        racePositions.length = 0;
        showMessage('RACE COMPLETE!');
        Sound.finish();
      } else if (playerLap === TOTAL_LAPS - 1) {
        Sound.finalLap();
      } else {
        Sound.lap();
      }
    } else {
      playerLastLapTime = gameTime;
    }
  }
  playerPrevAlong = along;
  
  // Checkpoint detection (for progress, not lap counting)
  const cIdx = getClosestCheckpointIndex(playerCar.position);
  const cpPos = checkpointPositions[cIdx];
  const dist = playerCar.position.distanceTo(cpPos);
  const detectDist = cIdx === 0 ? 4.5 : ROAD_WIDTH * 0.8;
  
  if (dist < detectDist && cIdx !== 0) {
    if (cIdx === playerLastCheckpoint + 1) {
      playerCheckpointsPassed++;
      playerLastCheckpoint = cIdx;
    } else if (cIdx > playerLastCheckpoint + 1 && cIdx - playerLastCheckpoint < NUM_CHECKPOINTS / 2) {
      playerCheckpointsPassed += (cIdx - playerLastCheckpoint);
      playerLastCheckpoint = cIdx;
    }
  }
  Sound.upEngine(Math.abs(playerSpeed));
}

function _getTrackT(pos) {
  let bestIdx = 0;
  let bestDist = Infinity;
  const pts = trackSamplePts;
  for (let i = 0; i < pts.length; i++) {
    const dx = pos.x - pts[i].x;
    const dz = pos.z - pts[i].z;
    const d = dx * dx + dz * dz;
    if (d < bestDist) { bestDist = d; bestIdx = i; }
  }
  let bestT = bestIdx / (pts.length - 1);
  let step = 1 / (pts.length - 1);
  for (let iter = 0; iter < 3; iter++) {
    step /= 2;
    const t0 = Math.max(0, bestT - step);
    const p0 = trackCurve.getPoint(t0);
    const d0 = pos.distanceToSquared(p0);
    if (d0 < bestDist) { bestDist = d0; bestT = t0; }
    const t1 = Math.min(1, bestT + step);
    const p1 = trackCurve.getPoint(t1);
    const d1 = pos.distanceToSquared(p1);
    if (d1 < bestDist) { bestDist = d1; bestT = t1; }
  }
  return bestT;
}

function updateAI(dt) {
  const maxLateral = 5.5;
  const lookahead = 0.08;
  const steerSpeed = 12;
  const repulsionStrength = 25;
  const repulsionRange = 0.18;
  const brakeRange = 0.15;

  let playerT = 0;
  let playerLat = 0;
  if (countdown <= 0) {
    playerT = _getTrackT(playerCar.position);
    const pp = getTrackPosition(playerT);
    const pt = getTrackTangent(playerT);
    const pn = new THREE.Vector3(-pt.z, 0, pt.x);
    playerLat = (playerCar.position.x - pp.x) * pn.x + (playerCar.position.z - pp.z) * pn.z;
  }

  for (let i = 0; i < AI_COUNT; i++) {
    const ai = aiData[i];
    const car = aiCars[i];

    if (ai.finished) {
      if (ai.speed > 0) ai.speed = Math.max(ai.speed - DRAG * dt, 0);
      ai.t += (ai.speed / trackLength) * dt;
      if (ai.t >= 1) ai.t -= 1;
      const p = getTrackPosition(ai.t);
      const tangent = getTrackTangent(ai.t);
      const normal = new THREE.Vector3(-tangent.z, 0, tangent.x);
      car.position.copy(p);
      car.position.x += normal.x * ai.currentLateral + ai.driftOffset.x;
      car.position.z += normal.z * ai.currentLateral + ai.driftOffset.z;
      car.position.y = p.y + 0.15;
      ai.driftOffset.multiplyScalar(0.97);
      car.rotation.y = Math.atan2(tangent.x, tangent.z);
      continue;
    }

    const ct = Math.max(0, Math.min(1, ai.t));
    const lookT = Math.max(0, Math.min(1, ai.t + lookahead));
    const tangent0 = getTrackTangent(ct);
    const tangent1 = getTrackTangent(lookT);
    const normal0 = new THREE.Vector3(-tangent0.z, 0, tangent0.x);

    // Curvature
    const curveAngle = Math.acos(Math.max(-1, Math.min(1, tangent0.dot(tangent1))));
    const curveSign = tangent0.x * tangent1.z - tangent0.z * tangent1.x;

    // Corner cutting
    const cornerAmount = Math.max(0, Math.min(1, (curveAngle - 0.01) / 0.04));
    let targetLat = 0;
    if (cornerAmount > 0) {
      const idealCut = Math.sign(curveSign) * cornerAmount * Math.min(curveAngle * 25, 4);
      targetLat = idealCut;
    }

    let carsAhead = 0;
    let carsBehind = 0;
    let minAbsTDiff = Infinity;

    // Obstacle repulsion and braking from AI cars
    for (let j = 0; j < AI_COUNT; j++) {
      if (j === i) continue;
      const other = aiData[j];
      const otherProgress = other.lap + other.t;
      const aiProgress = ai.lap + ai.t;
      const tDiff = otherProgress - aiProgress;
      const absTDiff = Math.abs(tDiff);
      if (absTDiff < repulsionRange) {
        const latDiff = ai.currentLateral - other.currentLateral;
        const absLat = Math.abs(latDiff);
        if (absLat < 5) {
          const dir = absLat < 0.5 ? (j < i ? 1 : -1) : Math.sign(latDiff);
          const latFactor = 1 - absLat / 5;
          const tFactor = 1 - absTDiff / repulsionRange;
          targetLat += dir * repulsionStrength * latFactor * latFactor * tFactor;
          if (absLat < 3.5) {
            if (tDiff > 0) carsAhead++; else carsBehind++;
            if (absTDiff < minAbsTDiff) minAbsTDiff = absTDiff;
          }
        }
      }
    }

    targetLat = Math.max(-maxLateral, Math.min(maxLateral, targetLat));
    targetLat += (0 - targetLat) * 1.0 * dt;

    const latDiff = targetLat - ai.currentLateral;
    const maxMove = steerSpeed * dt;
    ai.currentLateral += Math.max(-maxMove, Math.min(maxMove, latDiff));
    ai.currentLateral = Math.max(-maxLateral, Math.min(maxLateral, ai.currentLateral));

    // Target speed based on curvature
    let targetSpeed = ai.baseSpeed;
    targetSpeed *= Math.max(0.6, 1 - curveAngle * 4);

    // Brake for nearby AI cars
    for (let j = 0; j < AI_COUNT; j++) {
      if (j === i) continue;
      const other = aiData[j];
      const otherProgress = other.lap + other.t;
      const aiProgress = ai.lap + ai.t;
      const tDiff = otherProgress - aiProgress;
      const absTDiff = Math.abs(tDiff);
      if (absTDiff < brakeRange) {
        const latDist = Math.abs(ai.currentLateral - other.currentLateral);
        if (latDist < 5) {
          const brakeFactor = Math.max(0, 1 - absTDiff / brakeRange) * Math.max(0, 1 - latDist / 5);
          targetSpeed *= (1 - brakeFactor * 0.85);
        }
      }
    }

    // Speed adjustment based on nearby cars — leader speeds up, follower slows down
    if (carsAhead > 0 && carsBehind === 0) {
      targetSpeed *= (1 + carsAhead * 0.12);
    } else if (carsBehind > 0 && carsAhead === 0) {
      targetSpeed *= (1 - carsBehind * 0.15);
    } else if (carsAhead > 0 && carsBehind > 0) {
      targetSpeed *= 0.85;
    }

    // Panic brake when very close to any car
    if (minAbsTDiff < 0.04) {
      targetSpeed = Math.min(targetSpeed, 15);
    }

    targetSpeed = Math.max(10, targetSpeed);

    if (ai.speed < targetSpeed) {
      ai.speed = Math.min(ai.speed + 50 * dt, targetSpeed);
    } else {
      ai.speed = Math.max(ai.speed - 80 * dt, targetSpeed);
    }

    ai.t += (ai.speed / trackLength) * dt;
    if (ai.t >= 1) {
      ai.t -= 1;
      ai.lap++;
      if (ai.lap >= TOTAL_LAPS) {
        ai.finished = true;
        ai.finishTime = gameTime;
      }
    }

    // Position
    const p = getTrackPosition(ct);
    car.position.copy(p);
    car.position.x += normal0.x * ai.currentLateral + ai.driftOffset.x;
    car.position.z += normal0.z * ai.currentLateral + ai.driftOffset.z;
    car.position.y = p.y + 0.15;
    // Pitch to match road slope
    const pitch = -Math.atan2(tangent0.y, Math.sqrt(tangent0.x * tangent0.x + tangent0.z * tangent0.z));
    car.rotation.x += (pitch - (car.rotation.x || 0)) * Math.min(1, 6 * dt);
    ai.driftOffset.multiplyScalar(0.97);

    // Smoothed lateral velocity
    const rawLatVel = (ai.currentLateral - (ai._prevLat ?? ai.currentLateral)) / dt;
    ai._prevLat = ai.currentLateral;
    ai._smoothLatVel = ai._smoothLatVel !== undefined ? ai._smoothLatVel * 0.9 + rawLatVel * 0.1 : rawLatVel;

    // Smooth rotation
    const forwardDir = new THREE.Vector3(tangent0.x, 0, tangent0.z);
    const latDir = new THREE.Vector3(normal0.x, 0, normal0.z);
    const velDir = forwardDir.clone().multiplyScalar(ai.speed).add(latDir.clone().multiplyScalar(ai._smoothLatVel));
    const targetRot = velDir.length() > 0.5 ? Math.atan2(velDir.x, velDir.z) : Math.atan2(tangent0.x, tangent0.z);
    let rotDiff = targetRot - car.rotation.y;
    rotDiff = Math.atan2(Math.sin(rotDiff), Math.cos(rotDiff));
    car.rotation.y += rotDiff * Math.min(1, 6 * dt);
  }
}

// ─── COLLISION ────────────────────────────────────────────
const _cAxis = new THREE.Vector3();
const _cDiff = new THREE.Vector3();
const _cCorner = new THREE.Vector3();

function obbOverlap(pos1, rot1, pos2, rot2) {
  const hw = 0.55, hl = 1.4;
  const c1 = Math.cos(rot1), s1 = Math.sin(rot1);
  const c2 = Math.cos(rot2), s2 = Math.sin(rot2);

  const axes = [];
  _cAxis.set(c1, 0, s1); axes.push(_cAxis.clone());
  _cAxis.set(-s1, 0, c1); axes.push(_cAxis.clone());
  _cAxis.set(c2, 0, s2); axes.push(_cAxis.clone());
  _cAxis.set(-s2, 0, c2); axes.push(_cAxis.clone());

  function getCorners(pos, c, s) {
    const corners = [];
    for (const [lx, lz] of [[-hw, -hl], [hw, -hl], [hw, hl], [-hw, hl]]) {
      _cCorner.set(pos.x + c * lx - s * lz, 0, pos.z + s * lx + c * lz);
      corners.push(_cCorner.clone());
    }
    return corners;
  }

  function project(corners, axis) {
    let min = Infinity, max = -Infinity;
    for (const c of corners) {
      const d = c.dot(axis);
      if (d < min) min = d;
      if (d > max) max = d;
    }
    return { min, max };
  }

  const c1c = getCorners(pos1, c1, s1);
  const c2c = getCorners(pos2, c2, s2);

  let minOverlap = Infinity;
  let bestAxis = new THREE.Vector3();

  for (const axis of axes) {
    const p1 = project(c1c, axis);
    const p2 = project(c2c, axis);
    const o1 = p1.max - p2.min;
    const o2 = p2.max - p1.min;
    if (o1 <= 0 || o2 <= 0) return null;
    if (o1 < minOverlap) { minOverlap = o1; bestAxis.copy(axis); }
    if (o2 < minOverlap) { minOverlap = o2; bestAxis.copy(axis).negate(); }
  }

  _cDiff.copy(pos2).sub(pos1);
  if (bestAxis.dot(_cDiff) < 0) bestAxis.negate();
  return { normal: bestAxis, overlap: minOverlap };
}

function getVel(rot, spd) {
  return new THREE.Vector3(Math.sin(rot) * spd, 0, Math.cos(rot) * spd);
}

function resolveCollisions() {
  const carList = [
    { pos: playerCar.position, rot: () => playerCar.rotation.y, speed: () => playerSpeed, setSpeed: (v) => { playerSpeed = v; }, isPlayer: true, aiIdx: -1 },
  ];
  for (let i = 0; i < AI_COUNT; i++) {
    carList.push({
      pos: aiCars[i].position,
      rot: () => aiCars[i].rotation.y,
      speed: () => aiData[i].speed,
      setSpeed: (v) => { aiData[i].speed = v; },
      isPlayer: false,
      aiIdx: i,
    });
  }

  for (let i = 0; i < carList.length; i++) {
    for (let j = i + 1; j < carList.length; j++) {
      const a = carList[i], b = carList[j];
      if (!a.isPlayer && !b.isPlayer) continue;
      const result = obbOverlap(a.pos, a.rot(), b.pos, b.rot());
      if (!result) continue;

      const now = performance.now();
      const lastA = a.isPlayer ? _playerCollisionTime : aiData[a.aiIdx]._collisionTime;
      const lastB = b.isPlayer ? _playerCollisionTime : aiData[b.aiIdx]._collisionTime;
      if (now - (lastA || 0) > 300 || now - (lastB || 0) > 300) {
        Sound.collision();
        const t = now;
        if (a.isPlayer) _playerCollisionTime = t; else aiData[a.aiIdx]._collisionTime = t;
        if (b.isPlayer) _playerCollisionTime = t; else aiData[b.aiIdx]._collisionTime = t;
      }
      const n = result.normal;
      const push = result.overlap * 0.5;
      a.pos.addScaledVector(n, -push);
      b.pos.addScaledVector(n, push);
      if (!a.isPlayer) aiData[a.aiIdx].driftOffset.addScaledVector(n, -push);
      if (!b.isPlayer) aiData[b.aiIdx].driftOffset.addScaledVector(n, push);

      const va = getVel(a.rot(), a.speed());
      const vb = getVel(b.rot(), b.speed());

      const rel = va.clone().sub(vb);
      const vn = rel.dot(n);

      if (vn < 0) {
        const e = 0.7;
        const j = -(1 + e) * vn * 0.5;
        va.addScaledVector(n, j);
        vb.addScaledVector(n, -j);
        a.setSpeed(Math.max(va.length(), 3));
        b.setSpeed(Math.max(vb.length(), 3));
      } else {
        a.setSpeed(Math.max(a.speed() * 0.9, 3));
        b.setSpeed(Math.max(b.speed() * 0.9, 3));
      }

      if (a.isPlayer) {
        const side = n.dot(new THREE.Vector3(Math.cos(a.rot()), 0, -Math.sin(a.rot())));
        playerCar.rotation.y += side * 0.06;
      }
    }
  }
}

function showMessage(text) {
  messageEl.textContent = text;
  messageEl.classList.add('show');
}

// ─── CAMERA ────────────────────────────────────────────────
let cameraMode = 'first'; // 'third' or 'first'
let cameraTransition = 0;
let cameraTransProgress = 0;
const cameraTransStartPos = new THREE.Vector3();
const cameraTransStartLook = new THREE.Vector3();

function toggleCamera() {
  cameraMode = cameraMode === 'third' ? 'first' : 'third';
  cameraTransition = 0.4;
  cameraTransProgress = 0;
  cameraTransStartPos.copy(camera.position);
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  cameraTransStartLook.copy(camera.position).add(dir);
}

const camThirdOffset = new THREE.Vector3(0, 10, -16);
const camFirstOffset = new THREE.Vector3(0, 0.85, 0.3);

function updateCamera(dt) {
  const isFirst = cameraMode === 'first';
  const offset = isFirst ? camFirstOffset : camThirdOffset;
  const carQuat = playerCar.quaternion;
  const yawQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), playerCar.rotation.y);
  const worldOffset = offset.clone().applyQuaternion(isFirst ? carQuat : yawQuat);
  const desiredPos = playerCar.position.clone().add(worldOffset);

  let desiredLook;
  if (isFirst) {
    const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(carQuat);
    desiredLook = playerCar.position.clone().add(forward.multiplyScalar(100));
  } else {
    desiredLook = playerCar.position.clone();
  }

  if (cameraTransition > 0) {
    cameraTransProgress += dt;
    const t = Math.min(cameraTransProgress / cameraTransition, 1);
    camera.position.lerpVectors(cameraTransStartPos, desiredPos, t);
    const transitionLook = new THREE.Vector3();
    transitionLook.lerpVectors(cameraTransStartLook, desiredLook, t);
    camera.lookAt(transitionLook);
    if (t >= 1) cameraTransition = 0;
  } else if (isFirst) {
    camera.position.copy(desiredPos);
    const flip = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), Math.PI);
    camera.quaternion.copy(playerCar.quaternion.clone().multiply(flip));
  } else {
    camera.position.lerp(desiredPos, 0.08);
    camera.lookAt(playerCar.position);
  }
}

// ─── GAME LOOP ────────────────────────────────────────────
let lastTime = 0;

function isPlayerOffTrack() {
  const pos = playerCar.position;
  for (let i = 0; i <= 100; i++) {
    const tp = getTrackPosition(i / 100);
    tp.y = 0;
    const dx = pos.x - tp.x;
    const dz = pos.z - tp.z;
    if (dx * dx + dz * dz < (ROAD_WIDTH / 2 + 5) ** 2) return false;
  }
  return true;
}

function gameLoop(time) {
  requestAnimationFrame(gameLoop);
  
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;
  
  if (!gameStarted) {
    gameStarted = true;
    showMessage('3');
    countdownTimer = 0;
    countdown = 3;
  }
  
  // Countdown
  if (countdown > 0) {
    countdownTimer += dt;
    if (countdownTimer >= 1) {
      countdownTimer -= 1;
      countdown--;
      if (countdown > 0) {
        showMessage(String(countdown));
        Sound.beep(440, 0.12, 0.25);
      } else {
        showMessage('GO!');
        Sound.beep(660, 0.25, 0.3);
        setTimeout(() => messageEl.classList.remove('show'), 500);
      }
    }
  } else if (!paused) {
    if (!gameOver) {
      gameTime += dt;
    }
    if (!penaltyActive) updatePlayer(dt);
    updateAI(dt);
    if (gameTime > 2) resolveCollisions();

    // Off-track penalty
    if (isPlayerOffTrack() && !penaltyActive && !gameOver) {
      penaltyActive = true;
      penaltyTimer = 0;
      penaltyTeleported = false;
      penaltyCountdownStarted = false;
      Sound.offEngine();
      Sound.offTrack();
      document.getElementById('fade-overlay').style.opacity = '1';
    }

    if (penaltyActive) {
      penaltyTimer += dt;

      if (!penaltyTeleported && penaltyTimer >= 0.3) {
        penaltyTeleported = true;
        let closestT = 0;
        let minDist = Infinity;
        for (let i = 0; i < trackSamplePts.length; i++) {
          const dist = playerCar.position.distanceTo(trackSamplePts[i]);
          if (dist < minDist) {
            minDist = dist;
            closestT = i / (trackSamplePts.length - 1);
          }
        }
        placeOnGrid(playerCar, closestT, 0, 0);
        playerSpeed = 0;
      }

      if (penaltyTeleported && penaltyTimer >= 0.6 && !penaltyCountdownStarted) {
        penaltyCountdownStarted = true;
        document.getElementById('fade-overlay').style.opacity = '0';
        showMessage('PENALTY 2');
        Sound.beep(440, 0.12, 0.25);
      }

      if (penaltyCountdownStarted) {
        const elapsed = penaltyTimer - 0.6;
        const prevRemaining = Math.ceil(2 - (elapsed - dt));
        const nowRemaining = Math.ceil(2 - elapsed);
        if (nowRemaining < prevRemaining && nowRemaining > 0) {
          showMessage('PENALTY ' + nowRemaining);
          Sound.beep(440, 0.12, 0.25);
        }
      }

      if (penaltyCountdownStarted && penaltyTimer >= 2.6) {
        penaltyActive = false;
        showMessage('GO!');
        Sound.beep(660, 0.25, 0.3);
        setTimeout(() => messageEl.classList.remove('show'), 500);
      }
    }
  }

  if (!paused) updateRain(dt, playerCar.position.x, playerCar.position.z);
  if (!paused) updateCamera(dt);
  if (!paused) updateHUD();
  if (!paused) updateMinimap();
  
  // Wheel rotation
  const wheelSpeed = playerSpeed * 4;
  playerCar.children.forEach(child => {
    if (child.type === 'Group') {
      child.rotation.x += wheelSpeed * dt;
    }
  });
  
  renderer.autoClear = false;
  renderer.clear();

  // Main view
  renderer.setViewport(0, 0, window.innerWidth, window.innerHeight);
  renderer.setScissorTest(false);
  renderer.render(scene, camera);

  // Rear-view mirror
  if (!paused) {
    const MIRROR_W = 240, MIRROR_H = 135;
    const mirrorX = (window.innerWidth - MIRROR_W) / 2;
    const mirrorY = window.innerHeight - 10 - MIRROR_H;

    const forward = new THREE.Vector3(
      Math.sin(playerCar.rotation.y),
      0,
      Math.cos(playerCar.rotation.y)
    );
    const rearPos = playerCar.position.clone();
    rearPos.y += 1.5;
    rearPos.sub(forward.clone().multiplyScalar(0.5));
    rearViewCamera.position.copy(rearPos);
    const lookTarget = playerCar.position.clone().sub(forward.clone().multiplyScalar(20));
    rearViewCamera.lookAt(lookTarget);

    renderer.setViewport(mirrorX, mirrorY, MIRROR_W, MIRROR_H);
    renderer.setScissor(mirrorX, mirrorY, MIRROR_W, MIRROR_H);
    renderer.setScissorTest(true);
    renderer.clearDepth();
    renderer.render(scene, rearViewCamera);
    renderer.setScissorTest(false);
    renderer.setViewport(0, 0, window.innerWidth, window.innerHeight);
  }
  renderer.autoClear = true;
}

// ─── RESIZE ───────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── TRACK SELECTOR ─────────────────────────────────────────
let currentTrackId = 'sporting';
const trackNameEl = document.getElementById('track-name');
trackNameEl.textContent = TRACKS[currentTrackId].name;

function switchTrack(trackId) {
  if (trackId === currentTrackId) return;
  currentTrackId = trackId;
  trackNameEl.textContent = TRACKS[trackId].name;
  loadTrack(trackId);
  restartGame();
}

const trackSelect = document.getElementById('track-select');
for (const id of Object.keys(TRACKS)) {
  const opt = document.createElement('option');
  opt.value = id;
  opt.textContent = TRACKS[id].name;
  if (id === currentTrackId) opt.selected = true;
  trackSelect.appendChild(opt);
}
trackSelect.addEventListener('change', () => {
  switchTrack(trackSelect.value);
});

// ─── START ────────────────────────────────────────────────
requestAnimationFrame(gameLoop);
</script>
